name: "Remove: Hosting Provider"
description: Propose removing a hosting provider from ASHC
labels: ["remove: hosting-provider", "status: proposed"]
body:
  - type: input
    id: name
    attributes:
      label: Name of the Hosting Provider to remove
    validations:
      required: true

  - type: textarea
    id: justification
    attributes:
      label: Justification
      description: |
        Provide at least 1 reason, such as:
        - **Abandoned or deprecated** — link to evidence (shutdown announcement, archived repo, 2+ years of inactivity)
        - **Broken or non-existent** — the URL no longer works or the product is gone
        - **Duplicate** — this entry duplicates another listing in the directory (reference the duplicate)
      placeholder: "..."
    validations:
      required: true
