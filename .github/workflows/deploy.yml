name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync
        working-directory: github_site

      - name: Build directory data
        run: uv run python app.py build_directory
        working-directory: github_site
        env:
          SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          DEBUG: "False"
          ALLOWED_HOSTS: "moosetherebel.github.io"
          COLTRANE_SITE_URL: "https://moosetherebel.github.io/awesome-static-hosting-and-cms"
          COLTRANE_TITLE: "Awesome Static Hosting and CMS"

      - name: Build static site
        run: uv run coltrane record
        working-directory: github_site
        env:
          SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          DEBUG: "False"
          ALLOWED_HOSTS: "moosetherebel.github.io"
          COLTRANE_SITE_URL: "https://moosetherebel.github.io/awesome-static-hosting-and-cms"
          COLTRANE_TITLE: "Awesome Static Hosting and CMS"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: github_site/output/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
